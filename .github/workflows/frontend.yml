name: Vue.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./e-learning-frontend

    steps:
    - uses: actions/checkout@v4.2.2

    - name: Setup Node.js
      uses: actions/setup-node@v4.4.0
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: e-learning-frontend/package-lock.json

    - name: Install Dependencies
      run: npm install

    - name: Build Project
      run: npm run build
